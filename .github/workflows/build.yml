name: Build and Tar

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '10'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Create tar.gz
        run: tar -czf dist.tar.gz dist/

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-tar
          path: dist.tar.gz
