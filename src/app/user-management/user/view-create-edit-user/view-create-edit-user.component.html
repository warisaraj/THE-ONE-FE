<div class="row" style="width: 50%" *ngIf="loading">
    <div class="spiner-example-detail">
        <div class="sk-spinner sk-spinner-double-bounce">
            <div class="sk-double-bounce1"></div>
            <div class="sk-double-bounce2"></div>
        </div>
    </div>
</div>
<div class="row wrapper white-bg page-heading bgnone">
    <div class="soc-breadcrumb">
        <div class="row">
            <div class="col-md-8 col-xs-12 align-self-center">
                <h4 class="soc-title">User</h4>
                <div class="d-flex align-items-center" style="margin-top: -10px;">
                    <nav>
                        <ol class="breadcrumb">
                            <li class="breadcrumb-item">
                                <a (click)="goHomeMenu()"><i class="fas fa-folder-open mr-10"></i>User Management</a>
                            </li>
                            <li class="breadcrumb-item">
                                <a [routerLink]="['/user']">User</a>
                            </li>
                            <li class="breadcrumb-item active">
                                {{action}} User Info
                            </li>
                        </ol>
                    </nav>
                </div>
            </div>
            <div class="col-md-4 col-xs-12 align-self-center text-right">
                <button *ngIf="action === 'View' && menuPermissions.edit" (click)="btnEdit()" id="btnEditTop" name="btnEditTop"
                        class="btn btn-success float-xs-left mr-10" data-toggle="tooltip" data-placement="top"
                        title="Edit" [disabled]="disbledBtn.save">
                    <i class="fal fa-edit"></i><span>Edit</span>
                </button>
                <button *ngIf="action !== 'View'" (click)="btnSave()" id="btnSaveTop" name="btnSaveTop"
                        class="btn btn-success float-xs-left mr-10" data-target="#Modal-Savedsuccessfully"
                        data-toggle="modal" data-placement="top" title="Save" [disabled]="disbledBtn.save">
                    <i class="fas fa-save"></i><span>Save</span>
                </button>
                <button [routerLink]="['/user']" id="btnCancelTop" name="btnCancelTop"
                        class="btn btn-default float-xs-right" data-toggle="tooltip" data-placement="top"
                        title=" Cancel" style="margin-left: 3px;" [disabled]="disbledBtn.cancel">
                    <i class="fal fa-times"></i><span>Cancel</span>
                </button>
            </div>
        </div>
    </div>

</div>


<div class="wrapper wrapper-content-custom  animated fadeInRight">
    <div class="row">
        <div class="col-sm-12">
            <div class="ibox mb-0">
                <div class="ibox-bg">
                    <div class="ibox-heading">
                        <h5 class="ibox-title-text">User Info<br>
                            <small *ngIf="action !== 'View'">*Please enter data in the "Require Field" textbox.</small>
                            <!-- <small *ngIf="action === 'View'">View</small> -->
                        </h5>
                    </div>
                    <div class="ibox-body">
                        <div id="tab-1" class="tab-pane active">
                            <div class="panel-body">
                                <div class="row">
                                    <div class="col-lg-12">
                                        <div class="ibox float-e-margins">
                                            <div class="ibox-content" style="border:0px;">
                                                <form class="form-horizontal" [formGroup]="userForm">
                                                    <div class="form-group">
                                                        <label class="col-sm-2 control-label">Firstname<span
                                                                *ngIf="action !== 'View'"
                                                                class="fontred">*</span></label>
                                                        <div [ngClass]="{'has-error':!userForm.controls.txtFirstname.valid&&userForm.controls.txtFirstname.dirty,'col-sm-4':true}">
                                                            <input type="text" class="form-control" id="txtFirstname"
                                                                   name="txtFirstname" maxlength="255"
                                                                   [(ngModel)]="dataUser.firstname"
                                                                   formControlName="txtFirstname"
                                                                   [title]="dataUser.firstname"
                                                                   [attr.disabled]="disabledView ? '' : null">
                                                            <!-- <div *ngIf="!userForm.controls.txtFirstname.valid&&userForm.controls.txtFirstname.dirty" style="color: red;text-align: right">Firstname EN english alphabet values are required.</div> -->
                                                        </div>
                                                    </div>
                                                    <div class="hr-line-dashed"></div>
                                                    <div class="form-group">
                                                        <label class="col-sm-2 control-label">Lastname<span
                                                                *ngIf="action !== 'View'"
                                                                class="fontred">*</span></label>
                                                        <div [ngClass]="{'has-error':!userForm.controls.txtLastname.valid&&userForm.controls.txtLastname.dirty,'col-sm-4':true}">
                                                            <input type="text" class="form-control" id="txtLastname"
                                                                   name="txtLastname" maxlength="255"
                                                                   [(ngModel)]="dataUser.lastname"
                                                                   formControlName="txtLastname"
                                                                   [title]="dataUser.lastname"
                                                                   [attr.disabled]="disabledView ? '' : null">
                                                            <!-- <div *ngIf="!userForm.controls.txtLastname.valid&&userForm.controls.txtLastname.dirty" style="color: red;text-align: right">Lastname EN english alphabet values are required.</div> -->
                                                        </div>
                                                    </div>
                                                    <div class="hr-line-dashed"></div>
                                                    <div class="form-group">
                                                        <label class="col-sm-2 control-label">E-mail<span
                                                                *ngIf="action !== 'View'"
                                                                class="fontred">*</span></label>
                                                        <div [ngClass]="{'has-error':!userForm.controls.txtEmail.valid&&userForm.controls.txtEmail.dirty,'col-sm-4':true}">
                                                            <input type="text" class="form-control" id="txtEmail"
                                                                   name="txtEmail" maxlength="255"
                                                                   [(ngModel)]="dataUser.email"
                                                                   formControlName="txtEmail" [title]="dataUser.email"
                                                                   [attr.disabled]="disabledView ? '' : null">
                                                            <div *ngIf="!userForm.controls.txtEmail.valid && userForm.controls.txtEmail.errors && userForm.controls.txtEmail.errors.pattern"
                                                                 class="fontred text-right">E-mail is Invalid Format.
                                                            </div>
                                                        </div>

                                                    </div>
                                                    <div class="hr-line-dashed"></div>
                                                    <div class="form-group">
                                                        <label class="col-sm-2 control-label">Mobile number
                                                            <!-- <span *ngIf="action !== 'View'" class="fontred">*</span> -->
                                                        </label>
                                                        <div [ngClass]="{'has-error':!userForm.controls.txtTelephoneNumber.valid&&userForm.controls.txtTelephoneNumber.dirty,'col-sm-4':true}">
                                                            <!--^[0-9]{0,}$-->
                                                            <input (keypress)="eventHandler($event)" type="text"
                                                                   class="form-control" id="txtTelephoneNumber"
                                                                   name="txtTelephoneNumber" maxlength="100"
                                                                   [(ngModel)]="dataUser.telephoneNumber"
                                                                   formControlName="txtTelephoneNumber"
                                                                   [title]="dataUser.telephoneNumber"
                                                                   [attr.disabled]="disabledView ? '' : null">
                                                            <div *ngIf="!userForm.controls.txtTelephoneNumber.valid && userForm.controls.txtTelephoneNumber.errors && userForm.controls.txtTelephoneNumber.errors.pattern"
                                                                 class="fontred text-right">Mobile number is Invalid
                                                                Format.
                                                            </div>
                                                        </div>
                                                    </div>
                                                    <div class="hr-line-dashed"></div>
                                                    <div class="form-group">
                                                        <label class="col-sm-2 control-label">Username<span
                                                                *ngIf="action === 'Create'"
                                                                class="fontred">*</span></label>
                                                        <div [ngClass]="{'has-error':!userForm.controls.txtUsername.valid&&userForm.controls.txtUsername.dirty,'col-sm-4':true}">
                                                            <input maxlength="50" (keypress)="eventHandler($event)"
                                                                   [readonly]="action === 'View' || action === 'Edit'"
                                                                   type="text" class="form-control" id="txtUsername"
                                                                   name="txtUsername" maxlength="50"
                                                                   [(ngModel)]="dataUser.username"
                                                                   formControlName="txtUsername"
                                                                   [title]="dataUser.username"
                                                                   [attr.disabled]="disabledView ? '' : null">
                                                        </div>
                                                    </div>
                                                    <div class="hr-line-dashed"></div>
                                                    <div class="form-group">
                                                        <label class="col-sm-2 control-label">Admin </label>
                                                        <div class="col-sm-4" style="margin-top: 10px;">
                                                            <dx-switch
                                                                    onText="" offText=""
                                                                    [(value)]="dataUser.admin"
                                                                    [disabled]="action == 'View'"></dx-switch>
                                                        </div>
                                                    </div>
                                                    <div class="hr-line-dashed"></div>
                                                    <div class="form-group">
                                                        <label class="col-sm-2 control-label">Position</label>
                                                        <div [ngClass]="{'col-sm-4':true}">
                                                            <div class="select-wrapper">
                                                                <select
                                                                        [attr.disabled]="disabledView ? '' : null"
                                                                        name="txtPosition"
                                                                        id="txtPosition"
                                                                        [title]="dataUser.position"
                                                                        class="form-control "
                                                                        formControlName="txtPosition"
                                                                        [(ngModel)]="dataUser.position"
                                                                        [ngClass]="{'disabled': action === 'View' }">
                                                                    <option selected="selected" [value]="''">Please select</option>
                                                                    <option *ngFor="let item of positionList"
                                                                            [value]="item">{{ item }}</option>
                                                                </select>
                                                            </div>
                                                        </div>
                                                    </div>
                                                </form>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="ibox-footer no-bg">
                        <div class="ibox-footer-right">
                            <button *ngIf="action === 'View' && menuPermissions.edit" (click)="btnEdit()" id="btnEditTop" name="btnEditTop"
                                class="btn btn-success float-xs-left mr-10" data-toggle="tooltip" data-placement="top"
                                title="Edit" [disabled]="disbledBtn.save">
                                <i class="fal fa-edit"></i><span>Edit</span>
                            </button>
                            <button *ngIf="action !== 'View'" (click)="btnSave()" id="btnSaveTop" name="btnSaveTop"
                                    class="btn btn-success float-xs-left mr-10" data-target="#Modal-Savedsuccessfully"
                                    data-toggle="modal" data-placement="top" title="Save" [disabled]="disbledBtn.save">
                                <i class="fas fa-save"></i><span>Save</span>
                            </button>
                            <button [routerLink]="['/user']" id="btnCancelTop" name="btnCancelTop"
                                    class="btn btn-default float-xs-right" data-toggle="tooltip" data-placement="top"
                                    title=" Cancel" style="margin-left: 3px;" [disabled]="disbledBtn.cancel">
                                <i class="fal fa-times"></i><span>Cancel</span>
                            </button>
                        </div>
                      </div>
                </div>
            </div>
        </div>
    </div>
</div>
<app-alert #myModal (onClickBack)="onClickBack()" (onCloseModalError)="onCloseModalError()"
           (onCloseModalWarning)="onCloseModalWarning()"></app-alert>
