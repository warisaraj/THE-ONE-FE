  <div class="row">
    <div class="col-sm-12">
      <div class="ibox">
        <div class="ibox-bg">
          <div class="ibox-heading">
            <h5 class="ibox-title-text">Notifications</h5>
          </div>
          <div class="ibox-body">

        <div *ngFor="let item of dataDataUsers; let i = index">
          <div class="title-list">{{item.date}}  </div>
            <div class='wrapper'>
                <div class='steps' id='steps'>
                  <div class='step'  *ngFor="let data of item.data;">
                    <div class='number completed'></div>
                    <div class='info'>
                      <p *ngIf="data.messageList.length === 0" class='title'>{{data.time}}<span style="margin-left:25px;">{{data.message}}</span></p>
                      <div *ngFor="let d of data.messageList ; let x = index">
                        <p *ngIf="x === 0" class='title'>{{data.time}}<span style="margin-left:25px;"> {{d}} </span></p>
                        <p *ngIf="x !== 0" class='title'><span *ngIf="x !== 0" style="margin-left:70px;"> {{d}} </span></p>
                      </div>
                      <!-- <p class='text'> {{data.title}} - {{data.message}}</p> -->
                    </div>
                  </div>
                </div>
            </div>
        </div>

          </div>
          <!--End List-->
        </div><!--End ibox-content-->
      </div><!--End ibox-->
    </div><!--End col-sm-12-->
  </div><!--End row-->
</div><!--End Wrapper-->

<app-alert #myModal (onCancelDelete)="onCancelDelete()" (onCancelViewWarning)="onCancelViewWarning()" (onCloseModalError)="onCloseModalError()" (onClickBack)="onClickBack()"></app-alert>
