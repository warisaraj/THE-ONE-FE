<div class="row">
  <nav class="navbar navbar-static-top wrapper-nav-header" role="navigation">
    <div class="navbar-header">
      <a class="navbar-minimalize minimalize-styl-2 fontmenuicon btn btn-slide" href="javascript:void(0);"
         (click)="SmoothlyMenu()"><i class="far fa-outdent"></i><i class="far fa-indent"></i> </a>
      <p
        class="m-none pull-right m-l header-main-text">THE ONE</p>
    </div>
    <ul class="nav navbar-top-links navbar-right pull-right">
      <!-- Notification -->
      <li class="dropdown notification-dropdown" style="vertical-align: top; margin-top: 3px;background-color: white;">
        <a class="dropdown-toggle count-info" data-toggle="dropdown" href="#" (click)="clickNoti()"
           style="background-color: white;">
          <span>
            <img src="assets/count-info.png" width="20" height="20">
              <div class="ant-scroll-number ant-badge-count-2" *ngIf="count > 0">
                  <span class="ant-scroll-number-only">
                    <span class="ant-scroll-number-only-unit current">{{count}}</span>
                  </span>
              </div>
          </span>
        </a>
        <!-- Notification List -->
        <ul class="dropdown-menu dropdown-alerts notification-box ps" style="background-color: #F9F7F2;"
            [perfectScrollbar]="config">
          <li *ngFor="let noti of notiList">
            <a (click)="clickRead(noti)">
              <div style="margin-left: 0;" class="content-notifications">
                <div class="clearfix"></div>
                <p *ngIf="noti.messageList.length === 0">{{noti.message}}</p>
                <div *ngFor="let d of noti.messageList">
                  <span> {{d}} </span>
                </div>
              </div>
            </a>
            <div class="divider"></div>
          </li>
          <li *ngIf="notiList.length <= 0">
            <div class="text-center link-block">
              <i class="fas fa-exclamation-triangle" style="margin-right: 20px; font-size: 24px; color: #da4552"></i>
              <strong>ไม่พบข้อมูล</strong>
            </div>
          </li>
          <li *ngIf="notiList.length > 0">
            <div class="text-center link-block">
              <a href="javascript:void(0)" (click)="clickListNoti()" style="width: 100%">
                <strong>See All</strong>
              </a>
            </div>
          </li>
        </ul>
      </li>
      <li style="vertical-align: top; margin-top: 12px;background-color: white;">
        <span class="text-muted text-xs block header-text-li" style="background-color: white;">{{username}}</span>
      </li>
      <li style="background-color: white;">
        <a [routerLink]="['/logout']" style="background-color: white;">
          <!-- <i class="fas fa-unlock-alt fs-24 mr-10"></i> -->
          <img src="assets/logout.png" width="20" height="20">
          <span class="m-none header-text-li" style="margin-left: 12px;">Logout</span>
        </a>
      </li>
    </ul>
  </nav>
  <img alt="image" src="assets/img/shadow.png" class="m-t-n-md"
       style="width:100%; height:10px; border:none; position: absolute"/>
</div>
