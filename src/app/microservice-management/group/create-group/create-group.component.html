<div class="row" style="width: 50%" *ngIf="loading">
    <div class="spiner-example-detail">
        <div class="sk-spinner sk-spinner-double-bounce">
            <div class="sk-double-bounce1"></div>
            <div class="sk-double-bounce2"></div>
        </div>
    </div>
</div>
<div class="row wrapper white-bg page-heading bgnone" *ngIf="!loading">
    <div class="soc-breadcrumb">
        <div class="row">
            <div class="col-md-8 col-xs-12 align-self-center">
                <h4 class="soc-title">Role</h4>
                <div class="d-flex align-items-center" style="margin-top: -10px;">
                    <nav>
                        <ol class="breadcrumb">
                            <li class="breadcrumb-item">
                                <a (click)="goHomeMenu()"><i class="fas fa-folder-open mr-10"></i>Menu management</a>
                            </li>
                            <li class="breadcrumb-item">
                                <a [routerLink]="['/roles']">Role</a>
                            </li>
                            <li class="breadcrumb-item">
                                <a [routerLink]="['/roles', menuId,'list-of-groups']"> List of
                                    role</a>
                            </li>
                            <li class="breadcrumb-item active">
                                Create Role
                            </li>
                        </ol>
                    </nav>
                </div>
            </div>
            <div class="col-md-4 col-xs-12 align-self-center text-right">
                <button (click)="btnSave()" id="btnSaveTop" name="btnSaveTop"
                        class="btn btn-success float-xs-left mr-10" data-target="#Modal-Savedsuccessfully"
                        data-toggle="modal" data-placement="top" title="Save" [disabled]="disbledBtn.save">
                    <i class="fas fa-save"></i><span>Save</span>
                </button>
                <button [routerLink]="['/roles', menuId,'list-of-groups']" id="btnCancelTop"
                        name="btnCancelTop" class="btn btn-default float-xs-right" data-toggle="tooltip"
                        data-placement="top" title="Cancel" style="margin-left: 3px;" [disabled]="disbledBtn.cancel">
                    <i class="fal fa-times"></i><span>Cancel</span>
                </button>
            </div>
        </div>
    </div>

</div>

<div class="wrapper wrapper-content-custom  animated fadeInRight">
    <div class="row">
        <div class="col-sm-12">
            <div class="ibox mb-0">
                <div class="ibox-bg">
                    <div class="ibox-heading">
                        <h5 class="ibox-title-text">Role Info<br><small>*Please enter data in the "Require Field"
                            textbox.</small></h5>
                    </div>
                    <div class="ibox-body">
                        <div id="tab-1" class="tab-pane active">
                            <div class="panel-body">
                                <div class="row">
                                    <div class="col-lg-12">
                                        <div class="ibox float-e-margins">
                                            <div class="ibox-content" style="border:0px;">
                                                <form class="form-horizontal" [formGroup]="addGroupForm">
                                                    <div class="form-group"><label class="col-sm-2 control-label">Role
                                                        Name<span class="fontred">*</span></label>
                                                        <div [ngClass]="{'has-error':!addGroupForm.controls.txtGroupName.valid&&addGroupForm.controls.txtGroupName.dirty,'col-sm-4':true}">
                                                            <input type="text" class="form-control" id="txtGroupName"
                                                                   name="txtGroupName" maxlength="255"
                                                                   [(ngModel)]="addDataGroups.roleName"
                                                                   formControlName="txtGroupName">
                                                        </div>
                                                    </div>
                                                    <div class="hr-line-dashed"></div>
                                                    <div class="form-group"><label class="col-sm-2 control-label">Description</label>
                                                        <div class="col-sm-10">
                                                            <textarea (keyup)="textAreaAutoHeight()"
                                                                      class="form-control" id="txtDescription"
                                                                      name="txtDescription" rows="3" placeholder=""
                                                                      style="resize: vertical"
                                                                      [(ngModel)]="addDataGroups.description"
                                                                      formControlName="txtDescription"></textarea>
                                                        </div>
                                                    </div>
                                                    <div class="hr-line-dashed"></div>
                                                </form>

                                                <div class="col-lg-12" style="padding: 12px 0px;">
                                                    <div class="col-lg-8">
                                                        <div class="row">
                                                            <div class="fontpink">Select Multiple Menus, Submenus</div>
                                                        </div>
                                                    </div>
                                                </div>
                                                <label class="" style="color:red">
                                                Note : If a menu is chosen without permission. You can access the menu but unable to view, add, edit, delete.
                                                </label>
                                                <div class="dx-treelist-headers dx-treelist-nowrap">
                                                    <div class="dx-treelist-content dx-treelist-scroll-container table-responsive ">
                                                        <div class="table-responsive">
                                                            <dx-tree-list
                                                                    id="treeListMicroservice"
                                                                    inputId="treeListMicroservice"
                                                                    name="treeListMicroservice"
                                                                    [dataSource]="microserviceMenuGroup"
                                                                    keyExpr="subMenuId"
                                                                    parentIdExpr="subMenuParentId"
                                                                    [showRowLines]="true"
                                                                    [showBorders]="true"
                                                                    [expandedRowKeys]="[]"
                                                                    [autoExpandAll]="true"
                                                                    [columnAutoWidth]="true"
                                                                    (onSelectionChanged)="onSelectionChanged($event)"
                                                                    (onEditorPreparing)="onEditorPreparing($event)"
                                                            >
                                                                <dxo-selection
                                                                        id="chkMicroservice"
                                                                        inputId="chkMicroservice"
                                                                        name="chkMicroservice"
                                                                        [selectAllMode]="false"
                                                                        mode="multiple"
                                                                        [recursive]="true">
                                                                </dxo-selection>
                                                                <dxo-scrolling showScrollbar="onHover"></dxo-scrolling>
                                                                <dxo-editing
                                                                        mode="cell"
                                                                        [allowUpdating]="true">
                                                                </dxo-editing>
                                                                <dxi-column dataField="subMenuName"
                                                                            caption="Menu" [allowSorting]="false"
                                                                            [allowEditing]="false"></dxi-column>
                                                                <dxi-column caption="View"
                                                                            dataField="menuPermissions.view"
                                                                            alignment="center"></dxi-column>
                                                                <dxi-column caption="Add"
                                                                            dataField="menuPermissions.add"
                                                                            alignment="center"></dxi-column>
                                                                <dxi-column caption="Edit"
                                                                            dataField="menuPermissions.edit"
                                                                            alignment="center"></dxi-column>
                                                                <dxi-column caption="Delete"
                                                                            dataField="menuPermissions.delete"
                                                                            alignment="center"></dxi-column>
                                                                <!--<div *dxTemplate="let data of 'cellTemplateView'">-->
                                                                <!--<dx-check-box [(value)]="data.data.menuPermissions.view"></dx-check-box>-->
                                                                <!--</div>-->
                                                                <!--<dxi-column caption="Add" cellTemplate="cellTemplateCreate" alignment="center"></dxi-column>-->
                                                                <!--<div *dxTemplate="let data of 'cellTemplateCreate'">-->
                                                                <!--<dx-check-box [(value)]="data.data.menuPermissions.add"></dx-check-box>-->
                                                                <!--</div>-->
                                                                <!--<dxi-column caption="Edit" cellTemplate="cellTemplateEdit" alignment="center"></dxi-column>-->
                                                                <!--<div *dxTemplate="let data of 'cellTemplateEdit'">-->
                                                                <!--<dx-check-box [(value)]="data.data.menuPermissions.edit"></dx-check-box>-->
                                                                <!--</div>-->
                                                                <!--<dxi-column caption="Delete" cellTemplate="cellTemplateDelete" alignment="center"></dxi-column>-->
                                                                <!--<div *dxTemplate="let data of 'cellTemplateDelete'">-->
                                                                <!--<dx-check-box [(value)]="data.data.menuPermissions.delete"></dx-check-box>-->
                                                                <!--</div>-->
                                                            </dx-tree-list>
                                                        </div>
                                                    </div>
                                                </div>

                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                        </div>
                    </div>
                    <div class="ibox-footer no-bg">
                      <div class="ibox-footer-right">
                        <button (click)="btnSave()" id="btnSaveTop" name="btnSaveTop"
                            class="btn btn-success float-xs-left mr-10" data-target="#Modal-Savedsuccessfully"
                            data-toggle="modal" data-placement="top" title="Save" [disabled]="disbledBtn.save">
                            <i class="fas fa-save"></i><span>Save</span>
                        </button>
                        <button [routerLink]="['/roles', menuId,'list-of-groups']" id="btnCancelTop"
                                name="btnCancelTop" class="btn btn-default float-xs-right" data-toggle="tooltip"
                                data-placement="top" title="Cancel" style="margin-left: 3px;" [disabled]="disbledBtn.cancel">
                            <i class="fal fa-times"></i><span>Cancel</span>
                        </button>
                      </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<app-alert #myModal (onClickBack)="onClickBack()" (onCloseModalError)="onCloseModalError()"
           (onCloseModalWarning)="onCloseModalWarning()"></app-alert>
