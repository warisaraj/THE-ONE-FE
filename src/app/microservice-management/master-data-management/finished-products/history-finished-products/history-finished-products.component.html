<div class="row" style="width: 50%" *ngIf="loading">
  <div class="spiner-example-detail">
    <div class="sk-spinner sk-spinner-double-bounce">
      <div class="sk-double-bounce1"></div>
      <div class="sk-double-bounce2"></div>
    </div>
  </div>
</div>
<div class="row wrapper white-bg page-heading bgnone" *ngIf="!loading">
  <div class="soc-breadcrumb">
    <div class="row">
      <div class="col-md-8 col-xs-12 align-self-center">
        <h4 class="soc-title">Finished Products</h4>
        <div class="d-flex align-items-center" style="margin-top: -10px;">
          <nav>
            <ol class="breadcrumb">
              <li class="breadcrumb-item">
                <a (click)="goHomeMenu()"><i class="fas fa-folder-open mr-10"></i>Master Data Management</a>
              </li>
              <li class="breadcrumb-item">
                <a (click)="onClickBack()">Finished Products</a>
              </li>
              <li class="breadcrumb-item">
                <a (click)="onClickBackToView()">View Finished Products Info</a>
              </li>
              <li class="breadcrumb-item active">
                <span> History of data revisions</span>
              </li>
            </ol>
          </nav>
        </div>
      </div>
      <div class="col-md-4 col-xs-12 align-self-center text-right">
        <button (click)="onClickBack()" id="btnCancelTop" name="btnCancelTop" class="btn btn-default float-xs-right" data-toggle="tooltip" data-placement="top" title="Cancel" style="margin-left: 3px;" [disabled]="disbledBtn.cancel">
          <i class="fal fa-times"></i><span>Cancel</span>
        </button>
      </div>
    </div>
  </div>

</div>

<div class="wrapper wrapper-content-custom  animated fadeInRight">
  <div class="row">
    <div class="col-sm-12">
      <div class="ibox mb-0">
        <div class="ibox-bg">
          <div class="ibox-heading">
            <h5 class="ibox-title-text">History of "{{hn}}"</h5>
          </div>
          <div class="ibox-body">
            <div id="tab-1" class="tab-pane active">
              <div class="panel-body">
                <div class="row">
                  <div class="col-lg-12">
                    <div class="ibox float-e-margins">
                      <div class="ibox-content" style="border:0px;">
                        <div *ngFor="let key of historyData ; index as i">
                          <div style="background-color: #F9F7F2 !important; width: 100%;margin-bottom: 20px; padding: 20px;">
                            <div style="text-align: right;">
                              <label style="margin-right: 15px;"> Updated At : {{key.createdAt}} </label>
                              <label> Updated By : {{key.createdBy}} </label>
                            </div>
                            <div class="hr-line-solid" style="margin-top: 10px !important;"></div>
                            <div class="row-history">
                              <div *ngIf="key.code" class="column-history">
                                <label class="col-sm-6 control-label">Code:</label>
                                <label class="col-sm-6">{{key.code}}</label>
                              </div>

                              <div *ngIf="key.finishedProductName" class="column-history">
                                <label class="col-sm-6 control-label">Finished Product Name:</label>
                                <label class="col-sm-6">{{key.finishedProductName}}</label>
                              </div>

                              <div *ngIf="key.uom" class="column-history">
                                <label class="col-sm-6 control-label">UOM:</label>
                                <label class="col-sm-6">{{key.uom}}</label>
                              </div>

                              <div *ngIf="key.quantity" class="column-history">
                                <label class="col-sm-6 control-label">Quantity:</label>
                                <label class="col-sm-6">{{key.quantity}}</label>
                              </div>

                              <div *ngIf="key.unit" class="column-history">
                                <label class="col-sm-6 control-label">Unit:</label>
                                <label class="col-sm-6">{{key.unit}}</label>
                              </div>

                              <div *ngIf="key.supplyDay" class="column-history">
                                <label class="col-sm-6 control-label">Supply Day:</label>
                                <label class="col-sm-6">{{key.supplyDay}}</label>
                              </div>

                              <div *ngIf="key.priceThai" class="column-history">
                                <label class="col-sm-6 control-label">Price Thai:</label>
                                <label class="col-sm-6">{{key.priceThai}}</label>
                              </div>

                              <div *ngIf="key.priceInter" class="column-history">
                                <label class="col-sm-6 control-label">Price Inter:</label>
                                <label class="col-sm-6">{{key.priceInter}}</label>
                              </div>

                              <div *ngIf="key.priceMiddleEast" class="column-history">
                                <label class="col-sm-6 control-label">Price Middle East:</label>
                                <label class="col-sm-6">{{key.priceMiddleEast}}</label>
                              </div>

                              <div *ngIf="key.status" class="column-history">
                                <label class="col-sm-6 control-label">Status:</label>
                                <label class="col-sm-6">{{key.status}}</label>
                              </div>
                            </div>
                          </div>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
          <div class="ibox-footer no-bg">
            <div class="ibox-footer-right">
              <button (click)="onClickBack()" id="btnCancelTop" name="btnCancelTop" class="btn btn-default float-xs-right" data-toggle="tooltip" data-placement="top" title="Cancel" style="margin-left: 3px;" [disabled]="disbledBtn.cancel">
                <i class="fal fa-times"></i><span>Cancel</span>
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<app-alert #myModal (onClickBack)="onClickBack()" (onCloseModalError)="onCloseModalError()" (onCloseModalWarning)="onCloseModalWarning()"></app-alert>
