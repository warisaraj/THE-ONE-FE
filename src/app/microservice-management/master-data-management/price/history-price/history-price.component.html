<div class="row" style="width: 50%" *ngIf="loading">
  <div class="spiner-example-detail">
    <div class="sk-spinner sk-spinner-double-bounce">
      <div class="sk-double-bounce1"></div>
      <div class="sk-double-bounce2"></div>
    </div>
  </div>
</div>
<div class="row wrapper white-bg page-heading bgnone" *ngIf="!loading">
  <div class="soc-breadcrumb">
    <div class="row">
      <div class="col-md-8 col-xs-12 align-self-center">
        <h4 class="soc-title">Price</h4>
        <div class="d-flex align-items-center" style="margin-top: -10px;">
          <nav>
            <ol class="breadcrumb">
              <li class="breadcrumb-item">
                <a (click)="goHomeMenu()"><i class="fas fa-folder-open mr-10"></i>Master Data Management</a>
              </li>
              <li class="breadcrumb-item">
                <a (click)="onClickBack()">Price</a>
              </li>
              <li class="breadcrumb-item active">
                <span> History of data revisions</span>
              </li>
            </ol>
          </nav>
        </div>
      </div>
      <div class="col-md-4 col-xs-12 align-self-center text-right">
        <button (click)="onClickBack()" id="btnCancelTop" name="btnCancelTop" class="btn btn-default float-xs-right" data-toggle="tooltip" data-placement="top" title="Cancel" style="margin-left: 3px;" [disabled]="disbledBtn.cancel">
          <i class="fal fa-times"></i><span>Cancel</span>
        </button>
      </div>
    </div>
  </div>

</div>

<div class="wrapper wrapper-content-custom  animated fadeInRight">
  <div class="row">
    <div class="col-sm-12">
      <div class="ibox mb-0">
        <div class="ibox-bg">
          <div class="ibox-heading">
            <h5 class="ibox-title-text">History of data revisions</h5>
          </div>
          <div class="ibox-body">
            <div id="tab-1" class="tab-pane active">
              <div class="panel-body">
                <div class="row">
                  <div class="col-lg-12">
                    <div class="ibox float-e-margins">
                      <div class="ibox-content his-price" style="border:0px;">
                        <div *ngFor="let key of historyData ; index as i">
                          <div style="background-color: #F9F7F2 !important; width: 100%;margin-bottom: 20px; padding: 20px;">
                            <div style="text-align: right;">
                              <label style="margin-right: 15px;"> Updated At : {{key.createdAt}} </label>
                              <label> Updated By : {{key.createdBy}} </label>
                            </div>
                            <div class="hr-line-solid" style="margin-top: 10px !important;"></div>
                            <div class="row-history">
                              <div *ngIf="key.batchCharge" class="column-history">
                                <label class="control-label">Batch Charge</label>
                                <label class="control-label" style="text-align:center;width:30px;padding:0;margin:0;">:</label>
                                <label class="">{{key.batchCharge}}</label>
                              </div>
                            </div>
                            <div class="row-history">
                              <div *ngIf="key.packCharge" class="column-history">
                                <label class="control-label">Pack Charge</label>
                                <label class="control-label" style="text-align:center;width:30px;padding:0;margin:0;">:</label>
                                <label class="">{{key.packCharge}}</label>
                              </div>
                            </div>
                            <div class="row-history">
                              <div *ngIf="key.percentMarkup" class="column-history">
                                <label class="control-label">%Mark-Up</label>
                                <label class="control-label" style="text-align:center;width:30px;padding:0;margin:0;">:</label>
                                <label class="">{{key.percentMarkup}}</label>
                              </div>
                            </div>
                            <div *ngIf="key.productionCharge" class="">
                              <div class="column-history">
                                <label class="control-label">Production Charge</label>
                                <label class="control-label" style="text-align:center;width:30px;padding:0;margin:0;">:</label>
                              </div>
                              <table id="tblProductionCharge" class="table table-bordered" style="width:80%;margin:auto">
                                <thead>
                                  <tr>
                                    <th>Supply Day</th>
                                    <th>Production Charge (THB)</th>
                                  </tr>
                                </thead>
                                <tbody>
                                  <tr *ngFor="let item of key.productionCharge; let i = index;">
                                    <td>
                                      <div class="input-box">
                                        <label *ngIf="item.supplyDayTo" class="mb-0">{{item.supplyDayFrom || '-'}}</label>
                                        <label *ngIf="!item.supplyDayTo" class="mb-0">{{">= "+item.supplyDayFrom}}</label>
                                        <label *ngIf="item.supplyDayTo" class="mb-0">-</label>
                                        <label *ngIf="item.supplyDayTo" class="mb-0">{{item.supplyDayTo || '-'}}</label>
                                      </div>
                                    </td>
                                    <td>
                                      <div class="input-box" style="gap:5px">
                                        <label class="mb-0">{{item.productionCharge || '-'}}</label>
                                      </div>
                                    </td>
                                  </tr>
                                  <tr *ngIf="key.productionCharge?.length == 0">
                                    <td colspan="2" class="text-center">
                                      <label class="mb-0">No Data</label>
                                    </td>
                                  </tr>
                                </tbody>
                              </table>
                            </div>
                          </div>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
          <div class="ibox-footer no-bg">
            <div class="ibox-footer-right">
              <button (click)="onClickBack()" id="btnCancelTop" name="btnCancelTop" class="btn btn-default float-xs-right" data-toggle="tooltip" data-placement="top" title="Cancel" style="margin-left: 3px;" [disabled]="disbledBtn.cancel">
                <i class="fal fa-times"></i><span>Cancel</span>
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<app-alert #myModal (onClickBack)="onClickBack()" (onCloseModalError)="onCloseModalError()" (onCloseModalWarning)="onCloseModalWarning()"></app-alert>
