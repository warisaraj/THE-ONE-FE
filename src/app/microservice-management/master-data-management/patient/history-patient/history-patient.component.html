<div class="row" style="width: 50%" *ngIf="loading">
  <div class="spiner-example-detail">
    <div class="sk-spinner sk-spinner-double-bounce">
      <div class="sk-double-bounce1"></div>
      <div class="sk-double-bounce2"></div>
    </div>
  </div>
</div>
<div class="row wrapper white-bg page-heading bgnone" *ngIf="!loading">
  <div class="soc-breadcrumb">
    <div class="row">
      <div class="col-md-8 col-xs-12 align-self-center">
        <h4 class="soc-title">Patient</h4>
        <div class="d-flex align-items-center" style="margin-top: -10px;">
          <nav>
            <ol class="breadcrumb">
              <li class="breadcrumb-item">
                <a (click)="goHomeMenu()"><i class="fas fa-folder-open mr-10"></i>Master Data Management</a>
              </li>
              <li class="breadcrumb-item">
                <a (click)="onClickBack()">Patient</a>
              </li>
              <li class="breadcrumb-item active">
                <span> History of data revisions</span>
              </li>
            </ol>
          </nav>
        </div>
      </div>
      <div class="col-md-4 col-xs-12 align-self-center text-right">
        <button (click)="onClickBack()" id="btnCancelTop" name="btnCancelTop" class="btn btn-default float-xs-right"
          data-toggle="tooltip" data-placement="top" title="Cancel" style="margin-left: 3px;"
          [disabled]="disbledBtn.cancel">
          <i class="fal fa-times"></i><span>Cancel</span>
        </button>
      </div>
    </div>
  </div>

</div>

<div class="wrapper wrapper-content-custom  animated fadeInRight">
  <div class="row">
    <div class="col-sm-12">
      <div class="ibox mb-0">
        <div class="ibox-bg">
          <div class="ibox-heading">
            <h5 class="ibox-title-text">History of {{patientName}}</h5>
          </div>
          <div class="ibox-body">
            <div id="tab-1" class="tab-pane active">
              <div class="panel-body">
                <div class="row">
                  <div class="col-lg-12">
                    <div class="ibox float-e-margins">
                      <div class="ibox-content his-pharmacy" style="border:0px;">
                        <div *ngFor="let key of historyData ; index as i">
                          <div
                            style="background-color: #F9F7F2 !important; width: 100%;margin-bottom: 20px; padding: 20px;">
                            <div style="text-align: right;">
                              <label style="margin-right: 15px;"> Updated At : {{key.createdAt}} </label>
                              <label> Updated By : {{key.createdBy}} </label>
                            </div>
                            <div class="hr-line-light" style="margin-top: 10px !important;"></div>
                            <div class="row-history">

                              <div *ngIf="key.locationType" class="column-history">
                                <label class="col-sm-6 control-label">Location Type</label>
                                <label class="col-sm-6">{{key.locationType === 1 ? 'VTL' : 'Other'}}</label>
                              </div>

                              <div *ngIf="key.locationDetail" class="column-history">
                                <label class="col-sm-6 control-label">Location Detail:</label>
                                <label class="col-sm-6">{{key.locationDetail}}</label>
                              </div>

                              <div *ngIf="key.hn" class="column-history">
                                <label class="col-sm-6 control-label">HN:</label>
                                <label class="col-sm-6">{{key.hn}}</label>
                              </div>

                              <div *ngIf="key.preferredLanguage" class="column-history">
                                <label class="col-sm-6 control-label">Preferred Language:</label>
                                <label class="col-sm-6">{{key.preferredLanguage}}</label>
                              </div>

                              <div *ngIf="key.title" class="column-history">
                                <label class="col-sm-6 control-label">Title:</label>
                                <label class="col-sm-6">{{key.title}}</label>
                              </div>

                              <div *ngIf="key.mainAddress && key.mainAddress.addressType" class="column-history">
                                <label class="col-sm-6 control-label">Address Type:</label>
                                <label class="col-sm-6">{{key.mainAddress.addressType}}</label>
                              </div>

                              <div *ngIf="key.givenName" class="column-history">
                                <label class="col-sm-6 control-label">Given Name:</label>
                                <label class="col-sm-6">{{key.givenName}}</label>
                              </div>

                              <div *ngIf="key.mainAddress && key.mainAddress.address" class="column-history">
                                <label class="col-sm-6 control-label">Address:</label>
                                <label class="col-sm-6">{{key.mainAddress.address}}</label>
                              </div>

                              <div *ngIf="key.otherName" class="column-history">
                                <label class="col-sm-6 control-label">Other Name:</label>
                                <label class="col-sm-6">{{key.otherName}}</label>
                              </div>

                              <div *ngIf="key.mainAddress && key.mainAddress.district" class="column-history">
                                <label class="col-sm-6 control-label">District:</label>
                                <label class="col-sm-6">{{key.mainAddress.district}}</label>
                              </div>

                              <div *ngIf="key.surname" class="column-history">
                                <label class="col-sm-6 control-label">Surname:</label>
                                <label class="col-sm-6">{{key.surname}}</label>
                              </div>

                              <div *ngIf="key.mainAddress && key.mainAddress.subdistrict" class="column-history">
                                <label class="col-sm-6 control-label">Subdistrict:</label>
                                <label class="col-sm-6">{{key.mainAddress.subdistrict}}</label>
                              </div>

                              <div *ngIf="key.sex" class="column-history">
                                <label class="col-sm-6 control-label">Sex:</label>
                                <label class="col-sm-6">{{sexListMapById[key.sex]}}</label>
                              </div>

                              <div *ngIf="key.mainAddress && key.mainAddress.province" class="column-history">
                                <label class="col-sm-6 control-label">Province:</label>
                                <label class="col-sm-6">{{key.mainAddress.province}}</label>
                              </div>

                              <div *ngIf="key.dateOfBirth" class="column-history">
                                <label class="col-sm-6 control-label">Date Of Birth:</label>
                                <label class="col-sm-6">{{key.dateOfBirth}}</label>
                              </div>

                              <div *ngIf="key.mainAddress && key.mainAddress.postcode" class="column-history">
                                <label class="col-sm-6 control-label">Postcode:</label>
                                <label class="col-sm-6">{{key.mainAddress.postcode}}</label>
                              </div>

                              <div *ngIf="key.nationality" class="column-history">
                                <label class="col-sm-6 control-label">Nationality:</label>
                                <label class="col-sm-6">{{key.nationality}}</label>
                              </div>

                              <div *ngIf="key.phone" class="column-history">
                                <label class="col-sm-6 control-label">Phone:</label>
                                <label class="col-sm-6">{{key.phone}}</label>
                              </div>

                              <div *ngIf="key.mainAddress && key.mainAddress.isFavorite" class="column-history">
                                <label class="col-sm-6 control-label">Favorite:</label>
                                <div class="col-sm-6">
                                  <dx-check-box id="chkFavorite" [disabled]="true" class="checkbox-expense"
                                    [(value)]="key.mainAddress.isFavorite">
                                  </dx-check-box>
                                </div>
                              </div>



                              <div class="col-sm-12" *ngIf="key.patientAddress.length > 0">
                                <div
                                  *ngIf="key.hn || key.preferredLanguage || key.title || key.mainAddress || key.surname || key.sex || key.dateOfBirth || key.nationality || key.phone"
                                  class="hr-line-light ml-30 mr-30" style="margin-top: 10px !important; width: 95%;">
                                </div>
                                <label class="ml-30">Other Address</label>
                                <div style="width: 95%; background-color:#EDEDED; margin: auto;">
                                  <div class="row-history" style="padding-top: 20px; padding-bottom: 20px;"
                                    *ngFor="let address of key.patientAddress ; index as j">
                                    <div *ngIf="address.isFavorite !== null" class="column-history">
                                      <label class="col-sm-5 control-label">Favorite:</label>
                                      <div class="col-sm-5">
                                        <dx-check-box id="chkFavorite" [disabled]="true" class="checkbox-expense"
                                          [(value)]="address.isFavorite">
                                        </dx-check-box>
                                      </div>
                                    </div>

                                    <div *ngIf="address.province" class="column-history">
                                      <label class="col-sm-5 control-label">Province:</label>
                                      <label class="col-sm-5">{{address.province}}</label>
                                    </div>

                                    <div *ngIf="address.address" class="column-history">
                                      <label class="col-sm-5 control-label">Address:</label>
                                      <label class="col-sm-5">{{address.address}}</label>
                                    </div>

                                    <div *ngIf="address.postcode" class="column-history">
                                      <label class="col-sm-5 control-label">Postcode:</label>
                                      <label class="col-sm-5">{{address.postcode}}</label>
                                    </div>

                                    <div *ngIf="address.district" class="column-history">
                                      <label class="col-sm-5 control-label">District:</label>
                                      <label class="col-sm-5">{{address.district}}</label>
                                    </div>

                                    <div *ngIf="address.addressType" class="column-history">
                                      <label class="col-sm-5 control-label">Address Type:</label>
                                      <label class="col-sm-5">{{address.addressType}}</label>
                                    </div>

                                    <div *ngIf="address.subdistrict" class="column-history">
                                      <label class="col-sm-5 control-label">Subdistrict:</label>
                                      <label class="col-sm-5">{{address.subdistrict}}</label>
                                    </div>

                                    <div *ngIf="address.remark" class="column-history">
                                      <label class="col-sm-5 control-label">Remark:</label>
                                      <label class="col-sm-5">{{address.remark}}</label>
                                    </div>

                                    <br>
                                    <br>
                                  </div>
                                </div>


                              </div>

                            </div>
                          </div>
                        </div>

                              <label> Updated By : {{key.createdBy}} </label>
                            </div>

                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
          <div class="ibox-footer no-bg">
            <div class="ibox-footer-right">
              <button (click)="onClickBack()" id="btnCancelTop" name="btnCancelTop" class="btn btn-default float-xs-right"
                data-toggle="tooltip" data-placement="top" title="Cancel" style="margin-left: 3px;"
                [disabled]="disbledBtn.cancel">
                <i class="fal fa-times"></i><span>Cancel</span>
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<app-alert #myModal (onClickBack)="onClickBack()" (onCloseModalError)="onCloseModalError()"
  (onCloseModalWarning)="onCloseModalWarning()"></app-alert>
