<div class="row" style="width: 50%" *ngIf="loading">
    <div class="spiner-example-detail">
        <div class="sk-spinner sk-spinner-double-bounce">
            <div class="sk-double-bounce1"></div>
            <div class="sk-double-bounce2"></div>
        </div>
    </div>
</div>

<div class="row wrapper white-bg page-heading bgnone" *ngIf="!loading">

    <div class="soc-breadcrumb">
        <div class="row">
            <div class="col-md-8 col-xs-12 align-self-center">
                <h4 class="soc-title">Raw Materials</h4>
                <div class="d-flex align-items-center" style="margin-top: -10px;">
                    <nav>
                        <ol class="breadcrumb">
                            <li class="breadcrumb-item">
                                <a (click)="goHomeMenu()"><i class="fas fa-folder-open mr-10"></i>Master Data Management</a>
                            </li>
                            <li class="breadcrumb-item active">
                                Raw Materials
                            </li>
                        </ol>
                    </nav>
                </div>
            </div>
            <div class="col-md-4 col-xs-12 align-self-center text-right fix-bt">
                <button *ngIf="menuPermissions.add" [routerLink]="['/master-data-management','raw-materials', 'new']" id="btnCreateNewGroup" name="btnCreateNewGroup" class="btn btn-success float-xs-left " data-toggle="tooltip" data-placement="top" title="Create Raw Materials">
                    <i class="fal fa-plus"></i><span>Create Raw Materials</span>
                </button>
            </div>
        </div>
    </div>

</div>

<div class="wrapper wrapper-content-custom  animated fadeInRight">
    <div class="row">
        <div class="col-lg-12">
            <div class="ibox">
                <div class="ibox-bg">
                    <div class="ibox-heading">
                        <h5 class="ibox-title-text"><i class="fas fa-filter"></i>Filter</h5>
                        <div class="ibox-graph-info collapse-link" #collapseLink (click)="clickCollapse()">
                            <i class="far fa-chevron-down"></i>
                        </div>
                    </div>
                    <div class="ibox-body">
                        <div class="row">
                            <div class="col-sm-12">
                                <dx-data-grid #gridProductionManagement id="gridProductionManagement" [(dataSource)]="dataMicroservices" showBorders="false" [hoverStateEnabled]="true" noDataText="No data" [rowAlternationEnabled]="true" [columnAutoWidth]="true" [allowColumnResizing]="true" class="card-list-table">
                                    <dxo-load-panel [enabled]="true"></dxo-load-panel>
                                    <dxo-paging [pageSize]="dxgridPageSize"></dxo-paging>
                                    <dxo-pager [showPageSizeSelector]="true" [allowedPageSizes]="allowedPageSizes" [showInfo]="false" [visible]="true" [showNavigationButtons]="true">
                                    </dxo-pager>

                                    <dxi-column caption="No" [allowSorting]="false" [width]="50" alignment="center"></dxi-column>
                                    <dxi-column dataField="hn" dataType="string" caption="HN" [width]="100"></dxi-column>
                                    <dxi-column dataField="name" dataType="string" caption="Name" [width]="100"></dxi-column>
                                    <dxi-column dataField="type" dataType="string" caption="Type" [width]="100"></dxi-column>
                                    <dxi-column dataField="supplyDay" dataType="string" caption="Supply Day" [width]="100"></dxi-column>
                                    <dxi-column dataField="bookingSlotDate" dataType="string" caption="Production Booking Slot : Date / Time" [width]="100"></dxi-column>
                                    <dxi-column dataField="lotNumber" dataType="string" caption="Lot Number" [width]="100"></dxi-column>
                                    <dxi-column dataField="startDate" dataType="string" caption="Production Start Date / Time" [width]="100"></dxi-column>
                                    <dxi-column dataField="endDate" dataType="string" caption="Production End Date / Time" [width]="100"></dxi-column>
                                    <dxi-column dataField="note" dataType="string" caption="Note" [width]="100"></dxi-column>
                                    <dxi-column caption="Time Plan">
                                        <dxi-column cellTemplate="cellTemplate8" dataType="string" caption="8" [width]="40" class="test"></dxi-column>
                                        <div *dxTemplate="let data of 'cellTemplate8'" style="text-align: center;display: inline-flex;">
                                            <div style="width: 10px; background-color: #1a7bb9;height: 30px;"></div>
                                            <div style="width: 10px; background-color: #1a7bb9;height: 30px;"></div>
                                            <div style="width: 10px; background-color: #1a7bb9;height: 30px;"></div>
                                            <div style="width: 10px; background-color: #1a7bb9;height: 30px;"></div>
                                        </div>
                                        <dxi-column cellTemplate="cellTemplate9" dataType="string" caption="9" [width]="40"></dxi-column>
                                        <div *dxTemplate="let data of 'cellTemplate9'" style="text-align: center;display: inline-flex;">
                                            <div style="width: 10px; background-color: #1a7bb9;height: 30px;"></div>
                                            <div style="width: 10px; background-color: #1a7bb9;height: 30px;"></div>
                                            <div style="width: 10px; background-color: #1a7bb9;height: 30px;"></div>
                                            <div style="width: 10px; background-color: #1a7bb9;height: 30px;"></div>
                                        </div>
                                        <dxi-column cellTemplate="cellTemplate10" dataType="string" caption="10" [width]="40"></dxi-column>
                                        <div *dxTemplate="let data of 'cellTemplate10'" style="text-align: center;display: inline-flex;">
                                            <div style="width: 10px; height: 30px;"></div>
                                            <div style="width: 10px; height: 30px;"></div>
                                            <div style="width: 10px; height: 30px;"></div>
                                            <div style="width: 10px; height: 30px;"></div>
                                        </div>
                                        <dxi-column cellTemplate="cellTemplate11" dataType="string" caption="11" [width]="40"></dxi-column>
                                        <div *dxTemplate="let data of 'cellTemplate11'" style="text-align: center;display: inline-flex;">
                                            <div style="width: 10px; background-color: #b91a1a;height: 30px;"></div>
                                            <div style="width: 10px; height: 30px;"></div>
                                            <div style="width: 10px; height: 30px;"></div>
                                            <div style="width: 10px; height: 30px;"></div>
                                        </div>
                                    </dxi-column>

                                </dx-data-grid>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="ibox-footer">
                    <div class="ibox-footer-right">
                        <button *ngIf="menuPermissions.view" title="Search" (click)="clickSearch()" class="btn btn-success btn-md mr-10">
                            <span>Search</span>
                        </button>
                        <button *ngIf="menuPermissions.view" title="Clear" (click)="clickClear()" class="btn btn-default btn-md">
                            <span>Clear</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<!--End Wrapper-->

<app-alert #myModal (onOkDelete)="onOkDelete()" (onCancelDelete)="onCancelDelete()" (onCloseModalError)="onCloseModalError()"></app-alert>
