<div class="row" style="width: 50%" *ngIf="loading">
  <div class="spiner-example-detail">
    <div class="sk-spinner sk-spinner-double-bounce">
      <div class="sk-double-bounce1"></div>
      <div class="sk-double-bounce2"></div>
    </div>
  </div>
</div>
<div class="row wrapper white-bg page-heading bgnone" *ngIf="!loading">
  <div class="soc-breadcrumb">
    <div class="row">
      <div class="col-md-8 col-xs-12 align-self-center">
        <h4 class="soc-title">Capsules</h4>
        <div class="d-flex align-items-center" style="margin-top: -10px;">
          <nav>
            <ol class="breadcrumb">
              <li class="breadcrumb-item">
                <a (click)="goHomeMenu()"><i class="fas fa-folder-open mr-10"></i>Master Data Management</a>
              </li>
              <li class="breadcrumb-item">
                <a (click)="onClickBack()">Capsules</a>
              </li>
              <li class="breadcrumb-item active">
                <span *ngIf="pageType == 'view'"> View Capsules Info </span>
                <span *ngIf="pageType == 'new'"> Create Capsules Info </span>
                <span *ngIf="pageType == 'edit'"> Edit Capsules Info </span>
              </li>
            </ol>
          </nav>
        </div>
      </div>
      <div class="col-md-4 col-xs-12 align-self-center text-right">
        <button *ngIf="pageType != 'view'" (click)="btnSubmit()" id="btnSaveTop" name="btnSaveTop" class="btn btn-success float-xs-left mr-10" data-target="#Modal-Savedsuccessfully" data-toggle="modal" data-placement="top" title="Save" [disabled]="disbledBtn.save">
          <i class="fas fa-save"></i><span>Save</span>
        </button>
        <button *ngIf="pageType == 'view' && menuPermissions.edit " [routerLink]="['/master-data-management','capsules', Id ,'edit']" id="btnEditTop" name="btnEditTop" class="btn btn-success float-xs-left mr-10" data-toggle="tooltip" data-placement="top" title="Edit" [disabled]="disbledBtn.save">
          <i class="fas fa-edit"></i><span>Edit</span>
        </button>
        <button (click)="onClickBack()" id="btnCancelTop" name="btnCancelTop" class="btn btn-default float-xs-right" data-toggle="tooltip" data-placement="top" title="Cancel" style="margin-left: 3px;" [disabled]="disbledBtn.cancel">
          <i class="fal fa-times"></i><span>Cancel</span>
        </button>
      </div>
    </div>
  </div>

</div>

<div class="wrapper wrapper-content-custom  animated fadeInRight">
  <div class="row">
    <div class="col-sm-12">
      <div class="ibox mb-0">
        <div class="ibox-bg">
          <div class="ibox-heading">
            <h5 class="ibox-title-text">Capsules Info<br><small *ngIf="pageType != 'view'">*Please enter data in the "Require Field" textbox.</small></h5>
            <!-- <button [routerLink]="['/master-data-management','capsules', Id ,'history']" *ngIf="pageType == 'view'" class="btn btn-success float-xs-left mr-10" style="padding:5px" data-toggle="tooltip" data-placement="top" title="History of data revisions">
              <i class="fas fa-history" style="margin:0"></i>
            </button> -->
            <button [routerLink]="['/master-data-management','capsules', Id ,'history']" *ngIf="pageType == 'view'" style="padding: 5px 10px !important;" id="btnHistory" name="btnHistory" class="btn btn-success float-xs-left" data-toggle="tooltip" data-placement="top" title="History of data revisions">
              <img src="assets/icon-md/c7.svg" alt="">
            </button>
          </div>
          <div class="ibox-body">
            <div id="tab-1" class="tab-pane active">
              <div class="panel-body">
                <div class="row">
                  <div class="col-lg-12">
                    <div class="ibox float-e-margins">
                      <div class="ibox-content" style="border:0px;">
                        <form class="form-horizontal" [formGroup]="editGroupForm">

                          <div class="form-group"><label class="col-sm-3 control-label">Code<span class="fontred">*</span></label>
                            <div [ngClass]="{'has-error':!editGroupForm.controls.txtCode.valid&&editGroupForm.controls.txtCode.dirty,'col-sm-4':true}">
                              <input type="text" class="form-control" id="txtCode" name="txtCode" maxlength="50" [(ngModel)]="editDataGroups.code" formControlName="txtCode">
                            </div>
                          </div>
                          <div class="form-group"><label class="col-sm-3 control-label">Capsule Name<span class="fontred">*</span></label>
                            <div [ngClass]="{'has-error':!editGroupForm.controls.txtName.valid&&editGroupForm.controls.txtName.dirty,'col-sm-4':true}">
                              <input type="text" class="form-control" id="txtName" name="txtName" maxlength="255" [(ngModel)]="editDataGroups.capsuleName" formControlName="txtName">
                              <dx-check-box [disabled]="pageType == 'view'" class="mt-10 checkbox-expense" [(value)]="editDataGroups.isExpense" text="Expense"></dx-check-box>
                            </div>
                          </div>

                          <div class="form-group"><label class="col-sm-3 control-label">UOM<span class="fontred">*</span></label>
                            <div [ngClass]="{'has-error':!editGroupForm.controls.txtUom.valid&&editGroupForm.controls.txtUom.dirty,'col-sm-4':true}">
                              <!-- <input type="text" class="form-control" id="txtUom" name="txtUom" maxlength="255" [(ngModel)]="editDataGroups.uom" formControlName="txtUom"> -->
                              <div class="select-wrapper">
                                <select name="txtUom" id="txtUom" formControlName="txtUom" [title]="editDataGroups.uom" class="form-control " [(ngModel)]="editDataGroups.uom">
                                  <option selected="selected" [value]="undefined">Please select</option>
                                  <option *ngFor="let item of uomList" [value]="item">{{ item }}</option>
                                </select>
                              </div>
                            </div>
                          </div>
                          <div class="form-group"><label class="col-sm-3 control-label">Capsule Size<span class="fontred">*</span></label>
                            <div [ngClass]="{'has-error':!editGroupForm.controls.txtSize.valid&&editGroupForm.controls.txtSize.dirty,'col-sm-4':true}">
                              <!-- <input type="text" class="form-control" id="txtSize" name="txtSize" maxlength="255" [(ngModel)]="editDataGroups.size" formControlName="txtSize"> -->
                              <div class="select-wrapper">
                                <select name="txtSize" id="txtSize" formControlName="txtSize" [title]="editDataGroups.capsuleSize" class="form-control " [(ngModel)]="editDataGroups.capsuleSize">
                                  <option selected="selected" [value]="undefined">Please select</option>
                                  <option *ngFor="let item of capsuleSizeList" [value]="item">{{ item }}</option>
                                </select>
                              </div>
                            </div>
                          </div>
                          <div class="form-group"><label class="col-sm-3 control-label">Origin<span class="fontred">*</span></label>
                            <div [ngClass]="{'has-error':!editGroupForm.controls.txtOrigin.valid&&editGroupForm.controls.txtOrigin.dirty,'col-sm-4':true}">
                              <input type="text" class="form-control" id="txtOrigin" name="txtOrigin" maxlength="255" [(ngModel)]="editDataGroups.origin" formControlName="txtOrigin">
                            </div>
                          </div>
                          <div class="form-group">
                            <label class="col-sm-3 control-label" style="padding-top: 0px;">
                              <div> Packing Stat<span class="fontred">*</span></div>
                              <div class="sub-label"> mg </div>
                            </label>
                            <div [ngClass]="{'has-error':!editGroupForm.controls.txtPackingStat.valid&&editGroupForm.controls.txtPackingStat.dirty,'col-sm-4':true}">
                              <input (keypress)="numberOnly($event)" autocomplete="off" onPaste="return false" type="text" class="form-control" id="txtPackingStat" name="txtPackingStat" maxlength="6" [(ngModel)]="editDataGroups.packingStat" formControlName="txtPackingStat">
                            </div>
                          </div>

                          <div class="form-group">
                            <label class="col-sm-3 control-label" style="padding-top: 0px;">Picture <div class="sub-label"> Max. 1MB </div></label>
                            <div [ngClass]="{'col-sm-4':true}">

                              <div *ngIf="pageType != 'view'">
                                <div class="custom-file-upload" (click)="imageInput.click()">
                                  <input #imageInput type="file" accept=".heic,.heif,image/*" (change)="processFile(imageInput)" style="display: none">
                                  <span class="upload-text"> {{editDataGroups.imageName}} </span>
                                  <a class="upload-bt"> Upload </a>
                                </div>
                              </div>

                              <div *ngIf="filePicture" style="margin-top:10px;">
                                <div class="picture-preview">
                                  <img [attr.src]="filePicture | resolveImageUrl" (click)="popupImg()" />
                                </div>
                              </div>
                              <div *ngIf="!filePicture && pageType == 'view'">
                                <div class="picture-preview">
                                  <img src="assets/img/no-img.png">
                                </div>
                              </div>
                            </div>
                          </div>
                          <div class="hr-line-dashed"></div>
                          <!-- <div class="form-group"><label class="col-sm-3 control-label">Description</label>
                            <div class="col-sm-10">
                              <textarea (keyup)="textAreaAutoHeight()" class="form-control" id="txtDescription" name="txtDescription"rows="3" placeholder="Enter a message ..." style="resize: vertical"  [(ngModel)]="editDataGroups.description" formControlName="txtDescription"></textarea>
                            </div>
                          </div>
                          <div class="hr-line-dashed"></div> -->
                        </form>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
          <div class="ibox-footer no-bg">
            <div class="ibox-footer-right">
              <button *ngIf="pageType != 'view'" (click)="btnSubmit()" id="btnSaveTop" name="btnSaveTop" class="btn btn-success float-xs-left mr-10" data-target="#Modal-Savedsuccessfully" data-toggle="modal" data-placement="top" title="Save" [disabled]="disbledBtn.save">
                <i class="fas fa-save"></i><span>Save</span>
              </button>
              <button *ngIf="pageType == 'view' && menuPermissions.edit"  [routerLink]="['/master-data-management','capsules', Id ,'edit']" id="btnEditTop" name="btnEditTop" class="btn btn-success float-xs-left mr-10" data-toggle="tooltip" data-placement="top" title="Edit" [disabled]="disbledBtn.save">
                <i class="fas fa-edit"></i><span>Edit</span>
              </button>
              <button (click)="onClickBack()" id="btnCancelTop" name="btnCancelTop"  class="btn btn-default float-xs-right" data-toggle="tooltip" data-placement="top" title="Cancel" style="margin-left: 3px;" [disabled]="disbledBtn.cancel">
                <i class="fal fa-times"></i><span>Cancel</span>
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<dx-popup [fullScreen]="true" [dragEnabled]="false" [showTitle]="true" [showCloseButton]="true" [(visible)]="popupVisible">
  <div *dxTemplate="let data of 'content'" class="text-center">
    <img [src]="filePicture | resolveImageUrl" style="height:100%;" />
  </div>
</dx-popup>
<app-alert #myModal (onClickBack)="onClickBack()" (onCloseModalError)="onCloseModalError()" (onCloseModalWarning)="onCloseModalWarning()"></app-alert>

<dx-load-panel shadingColor="rgba(0,0,0,0.4)" [(visible)]="isLoadingPanel" [showIndicator]="true" [showPane]="true"
  [shading]="true">
</dx-load-panel>
