<div class="row" style="width: 50%" *ngIf="loading">
  <div class="spiner-example-detail">
    <div class="sk-spinner sk-spinner-double-bounce">
      <div class="sk-double-bounce1"></div>
      <div class="sk-double-bounce2"></div>
    </div>
  </div>
</div>

<div class="row wrapper white-bg page-heading bgnone" *ngIf="!loading">

  <div class="soc-breadcrumb">
    <div class="row">
      <div class="col-md-8 col-xs-12 align-self-center">
        <h4 class="soc-title">Report</h4>
        <div class="d-flex align-items-center" style="margin-top: -10px;">
          <nav>
            <ol class="breadcrumb">
              <li class="breadcrumb-item">
                <a (click)="goHomeMenu()"><i class="fas fa-folder-open mr-10"></i>Report</a>
              </li>
              <li class="breadcrumb-item active">
                Medication Dispensing Report
              </li>
            </ol>
          </nav>
        </div>
      </div>
    </div>
  </div>

</div>

<div class="wrapper wrapper-content-custom  animated fadeInRight">
  <div class="row">
    <div class="col-lg-12">
      <div class="ibox">
        <div class="ibox-bg">
          <div class="ibox-heading">
            <h5 class="ibox-title-text"><i class="fas fa-filter"></i>Filter</h5>
            <div class="ibox-graph-info collapse-link" #collapseLink (click)="clickCollapse()">
              <i class="far fa-chevron-down"></i>
            </div>
          </div>
          <div class="ibox-body">
            <div class="row">
              <div class="col-sm-12">
                <div class="panel-body">
                  <form method="get" class="form-horizontal">
                    <div class="form-group">
                      <label class="col-sm-2 control-label">Dispensed Date From</label>
                      <div class="col-sm-3">
                        <dx-date-box #dateFrom style="width: 100%;" [openOnFieldClick]="true" [acceptCustomValue]="false"
                          class="form-control cus-datebox" type="date" displayFormat="dd-MM-yyyy" [max]="max" [(value)]="filter.dispensedDateFrom"
                          (onValueChanged)="onValueChanged($event,'dispensedDateFrom')"></dx-date-box>
                      </div>
                      <label class="col-sm-2 control-label">Dispensed Date To</label>
                      <div class="col-sm-3">
                        <dx-date-box #dateTo style="width: 100%;" [openOnFieldClick]="true" [acceptCustomValue]="false"
                          class="form-control cus-datebox" type="date" displayFormat="dd-MM-yyyy" [min]="min" [(value)]="filter.dispensedDateTo"
                          (onValueChanged)="onValueChanged($event,'dispensedDateTo')"></dx-date-box>
                      </div>
                    </div>

                  </form>
                </div>
              </div>
            </div>
          </div>
          <div class="ibox-footer">
            <div class="ibox-footer-right">
              <button title="Download" (click)="clickDownload()" class="btn btn-success btn-md mr-10"
                *ngIf="menuPermissions.view">
                <span>Download</span>
              </button>
              <button title="Clear" (click)="clickClear()" class="btn btn-default btn-md" *ngIf="menuPermissions.view">
                <span>Clear</span>
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

</div>
