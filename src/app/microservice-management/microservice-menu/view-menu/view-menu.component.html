<div class="row" style="width: 50%" *ngIf="loading">
    <div class="spiner-example-detail">
        <div class="sk-spinner sk-spinner-double-bounce">
            <div class="sk-double-bounce1"></div>
            <div class="sk-double-bounce2"></div>
        </div>
    </div>
</div>
<div class="row wrapper white-bg page-heading bgnone" *ngIf="!loading">
    <div class="soc-breadcrumb">
        <div class="row">
            <div class="col-md-8 col-xs-12 align-self-center">
                <h4 class="soc-title">Menu</h4>
                <div class="d-flex align-items-center" style="margin-top: -10px;">
                    <nav>
                        <ol class="breadcrumb">
                            <li class="breadcrumb-item">
                                <a (click)="goHomeMenu()"><i class="fas fa-folder-open mr-10"></i>Menu Management</a>
                            </li>
                            <li class="breadcrumb-item">
                                <a [routerLink]="['/microservice-menus']">Menu</a>
                            </li>
                            <li class="breadcrumb-item active">
                                View Menu Info
                            </li>
                        </ol>
                    </nav>
                </div>
            </div>
            <div class="col-md-4 col-xs-12 align-self-center text-right fix-bt">
                <button *ngIf="menuPermissions.edit" [routerLink]="['/microservice-menus', menuId ,'edit']"
                        id="btnEditTop" name="btnEditTop" class="btn btn-success float-xs-left mr-10"
                        data-toggle="tooltip" data-placement="top" title="Edit" [disabled]="disbledBtn.save">
                    <i class="fas fa-edit"></i><span>Edit</span>
                </button>
                <button [routerLink]="['/microservice-menus']" id="btnCancelTop" name="btnCancelTop"
                        class="btn btn-default float-xs-right" data-toggle="tooltip" data-placement="top" title="Cancel"
                        [disabled]="disbledBtn.cancel">
                    <i class="fal fa-times"></i><span>Cancel</span>
                </button>
            </div>
        </div>
    </div>

</div>
<div class="wrapper wrapper-content-custom  animated fadeInRight">
    <div class="row">
        <div class="col-sm-12">
            <div class="ibox mb-0">
                <div class="ibox-bg">
                    <div class="ibox-heading">
                        <h5 class="ibox-title-text">Menu Info
                            <!-- <br><small>View</small> -->
                        </h5>
                    </div>
                    <div class="ibox-body">
                        <div id="tab-1" class="tab-pane active">
                            <div class="panel-body">
                                <div class="row">
                                    <div class="col-lg-12">
                                        <div class="ibox float-e-margins">
                                            <div class="ibox-content" style="border:0px;">
                                                <form method="get" class="form-horizontal">
                                                    <div class="form-group"><label class="col-sm-2 control-label">Menu
                                                        Name </label>
                                                        <div class="col-sm-10">
                                                            <input type="text" class="form-control"
                                                                   id="txtMicroserviceName" name="txtMicroserviceName"
                                                                   [(ngModel)]="getDataMicroserviceName"
                                                                   [title]="getDataMicroserviceName" disabled="true">
                                                        </div>
                                                    </div>
                                                    <div class="hr-line-dashed"></div>
                                                    <div class="form-group"><label class="col-sm-2 control-label">Description</label>
                                                        <div class="col-sm-10">
                                                            <textarea (keyup)="textAreaAutoHeight()"
                                                                      class="form-control" id="txtDescription"
                                                                      name="txtDescription" rows="3"
                                                                      style="resize: vertical" placeholder=""
                                                                      [(ngModel)]="getDataMicroserviceDescription"
                                                                      disabled="true"></textarea>
                                                        </div>
                                                    </div>

                                                    <div class="hr-line-dashed"></div>
                                                    <div class="form-group">
                                                        <label class="col-sm-2 control-label">icon

                                                            <div class="tooltip-i" style="margin-left:7px;">
                                                                <img src="assets/remark-icon.png" width="16px"
                                                                     height="16px">
                                                                <span class="tooltiptext">Only fontawesome version 5.2.0 is supported</span>
                                                            </div>


                                                        </label>
                                                        <div [ngClass]="{'col-sm-10':true}">
                                                            <input type="text" class="form-control" id="txtIcon"
                                                                   name="txtIcon" maxlength="100"
                                                                   [(ngModel)]="getDataMicroserviceMenuIcon"
                                                                   disabled="true"></div>
                                                    </div>

                                                    <!-- <div class="row fontgroup-area">
                                                      <div class="pull-left fontgroup-gray">Submenu</div>
                                                    </div> -->
                                                    <div class="form-group">
                                                        <div [ngClass]="{'col-sm-10':true}">
                                                            <div class="pull-left fontgroup-gray">Submenu</div>
                                                        </div>
                                                    </div>
                                                </form>
                                                <div id="tree-list-demo">
                                                    <!-- {{dataMenus |json}} -->
                                                    <!-- [(dataSource)]="dataMenus" -->
                                                    <dx-tree-list

                                                            [(dataSource)]="dataMenus"

                                                            keyExpr="subMenuId"
                                                            parentIdExpr="subMenuParentId"
                                                            [showRowLines]="true"
                                                            [showBorders]="true"
                                                            [columnAutoWidth]="true"
                                                            [expandedRowKeys]="[0,1, 2, 3, 4, 5]"
                                                            [autoExpandAll]="true"
                                                            [(hint)]="hoverTootip"
                                                    >
                                                        <dxo-editing
                                                                mode="row"
                                                                [allowUpdating]="false"
                                                                [allowDeleting]="false"
                                                                [allowAdding]="false">
                                                        </dxo-editing>

                                                        <dxi-column dataField="subMenuName" dataType="string"
                                                                    caption="Submenu"></dxi-column>
                                                        <dxi-column dataField="url" dataType="string"
                                                                    caption="URL"></dxi-column>
                                                        <dxi-column dataField="description" dataType="string"
                                                                    caption="Description"></dxi-column>
                                                        <dxi-column dataField="menuIcon" dataType="string"
                                                                    caption="icon"></dxi-column>

                                                        <dxi-column caption="New Tab"
                                                                    cellTemplate="cellTemplatenewTap"></dxi-column>
                                                        <div *dxTemplate="let data of 'cellTemplatenewTap';">
                                <span>
                                  {{data.data.newTap}}
                                </span>
                                                        </div>
                                                    </dx-tree-list>
                                                </div>

                                                <!--[selectedRowKeys]="selectRowKeyId" (onInitialized)="onInitialized($event)" (onSelectionChanged)="selectRow($event)"-->
                                                <!--<dx-data-grid #grid id="gridMenu" [(dataSource)]="dataViewMenus" keyExpr="menuId" showBorders="false" [hoverStateEnabled]="true"-->
                                                <!--noDataText="No data"-->
                                                <!--[rowAlternationEnabled]="true" [columnAutoWidth]="true" [allowColumnResizing]="true">-->
                                                <!--<dxo-paging [pageSize]="dxgridPageSize" [pageIndex]="pageIndex"></dxo-paging>-->
                                                <!--<dxo-pager [showPageSizeSelector]="true" [allowedPageSizes]="[allowedPageSizes]"-->
                                                <!--[showInfo]="false" [visible]="true" [showNavigationButtons]="true">-->
                                                <!--</dxo-pager>-->
                                                <!--<dxo-scrolling showScrollbar="onScroll"></dxo-scrolling>-->
                                                <!--<dxo-selection mode="single"></dxo-selection>-->
                                                <!--<dxo-remote-operations [sorting]="true" [paging]="true">-->
                                                <!--</dxo-remote-operations>-->

                                                <!--<dxi-column dataField="no" dataType="number" caption="No." alignment="left" width="10%"></dxi-column>-->
                                                <!--<dxi-column dataField="microserviceName" dataType="string" caption="Menu Name "></dxi-column>-->
                                                <!--<dxi-column dataField="description" dataType="string" caption="Description"></dxi-column>-->
                                                <!--<dxi-column dataField="updatedAt" caption="Updated at" sortOrder="desc" width="25%" cssClass="wrapped-column"></dxi-column>-->
                                                <!--<dxi-column dataField="" dataType="string" caption="Action" cellTemplate="cellTemplateView" width="8%"></dxi-column>-->

                                                <!--<div *dxTemplate="let data of 'cellTemplateStatus'" class="status-vcenter">-->
                                                <!--<span *ngIf="data.data.status=='true'" class="label label-active"> Active </span>-->
                                                <!--<span *ngIf="data.data.status=='false'" class="label label-inactive"> Inactive </span>-->
                                                <!--</div>-->
                                                <!--<div *dxTemplate="let data of 'cellTemplateView'">-->
                                                <!--<i *ngIf="data.data.selectRowKey" class="pull-right m-r fa fontselect fa-em-view fa-view-em-green" aria-hidden="true"></i>-->
                                                <!--</div>-->
                                                <!--</dx-data-grid>-->


                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                        </div>

                    </div>
                    <div class="ibox-footer no-bg">
                      <div class="ibox-footer-right">
                        <button *ngIf="menuPermissions.edit" [routerLink]="['/microservice-menus', menuId ,'edit']" id="btnEditTop" name="btnEditTop" class="btn btn-success float-xs-left mr-10" data-toggle="tooltip" data-placement="top" title="Edit" [disabled]="disbledBtn.save">
                          <i class="fas fa-edit"></i><span>Edit</span>
                        </button>
                        <button  [routerLink]="['/microservice-menus']" id="btnCancelTop" name="btnCancelTop" class="btn btn-default float-xs-right" data-toggle="tooltip" data-placement="top" title="Cancel" [disabled]="disbledBtn.cancel">
                          <i class="fal fa-times"></i><span>Cancel</span>
                        </button>
                      </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<app-alert #myModal (onClickBack)="onClickBack()" (onCloseModalError)="onCloseModalError()"></app-alert>
