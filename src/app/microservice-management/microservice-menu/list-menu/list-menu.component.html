<div class="row" style="width: 50%" *ngIf="loading">
  <div class="spiner-example-detail">
    <div class="sk-spinner sk-spinner-double-bounce">
      <div class="sk-double-bounce1"></div>
      <div class="sk-double-bounce2"></div>
    </div>
  </div>
</div>
<div class="row wrapper white-bg page-heading bgnone" *ngIf="!loading">
  <div class="soc-breadcrumb">
    <div class="row">
      <div class="col-md-8 col-xs-12 align-self-center">
        <h4 class="soc-title">Menu</h4>
        <div class="d-flex align-items-center" style="margin-top: -10px;">
          <nav>
            <ol class="breadcrumb">
              <li class="breadcrumb-item">
                <a (click)="goHomeMenu()"><i class="fas fa-folder-open mr-10"></i>Menu Management</a>
              </li>
              <li class="breadcrumb-item">
                <a>Menu</a>
              </li>
              <li class="breadcrumb-item active">
                List of menu
              </li>
            </ol>
          </nav>
        </div>
      </div>
      <div class="col-md-4 col-xs-12 align-self-center text-right fix-bt">
        <button *ngIf="menuPermissions.add" [routerLink]="['/microservice-menus/new']" id="btnCreateNewMenu"
                name="btnCreateNewMenu" title="Create Menu" [disabled]="disbledBtn.create"
                class="btn btn-success float-xs-left">
          <i class="fal fa-plus"></i><span>Create Menu</span>
        </button>
      </div>
    </div>
  </div>

</div>

<div class="wrapper wrapper-content-custom  animated fadeInRight">
  <div class="row">
    <div class="col-lg-12 mb-0">
      <div class="ibox">
        <div class="ibox-bg">
          <div class="ibox-heading">
            <h5 class="ibox-title-text"><i class="fas fa-filter"></i>Filter</h5>
            <div class="ibox-graph-info collapse-link" #collapseLink (click)="clickCollapse()">
              <i class="far fa-chevron-down"></i>
            </div>
          </div>
          <div class="ibox-body">
            <div class="row">
              <div class="col-sm-12">
                <div class="panel-body">
                  <form method="get" class="form-horizontal">
                    <div class="form-group">
                      <label class="col-sm-2 control-label">Menu Name</label>
                      <div class="col-sm-3"><input id="txtMicroserviceName" name="txtMicroserviceName" maxlength="255"
                                                   type="text" class="form-control" [(ngModel)]="txtInputSearch"></div>
                    </div>
                  </form>
                </div>
              </div>
            </div>
          </div>
          <div class="ibox-footer">
            <div class="ibox-footer-right">
              <button *ngIf="menuPermissions.view" title="Search" (click)="clickSearch()"
                      class="btn btn-success btn-md mr-10">
                <span>Search</span>
              </button>
              <button *ngIf="menuPermissions.view" title="Clear" (click)="clickClear()" class="btn btn-default btn-md">
                <span>Clear</span>
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div class="row">
    <div class="col-sm-12">
      <div class="ibox">
        <div class="ibox-bg">
          <div class="ibox-heading-total">
            <h5 class="ibox-title-text">{{textTotal}}</h5>
          </div>
          <div class="ibox-body">
            <!--[selectedRowKeys]="selectRowKeyId" (onInitialized)="onInitialized($event)" (onSelectionChanged)="selectRow($event)"-->
            <div class="table-responsive table-wrapper">
              <dx-data-grid #gridMicroservices id="gridMicroservices"
                            [(dataSource)]="dataMicroservices"
                            keyExpr="menuId"
                            [cacheEnabled]="false"
                            [hoverStateEnabled]="true"
                            noDataText="No data"
                            showBorders="true"
                            [rowAlternationEnabled]="true"
                            [columnAutoWidth]="false"
                            [allowColumnResizing]="true"
                            [allowColumnReordering]="true"
                            [wordWrapEnabled]="false"
                            (onCellPrepared)="onCellPrepared($event)"
                            class="card-list-table"
                            (onCellHoverChanged)="onCellHoverChanged($event)"
                            (onOptionChanged)="changePageIndex($event)"
              >
                <dxo-paging [pageSize]="dxgridPageSize" [pageIndex]="pageIndex"></dxo-paging>
                <dxo-pager [showPageSizeSelector]="true" [allowedPageSizes]="allowedPageSizes"
                           [showInfo]="false" [visible]="true" [showNavigationButtons]="true">
                </dxo-pager>
                <dxo-scrolling showScrollbar="onHover"></dxo-scrolling>
                <dxo-selection mode="single"></dxo-selection>
                <dxo-remote-operations [sorting]="true" [paging]="true">
                </dxo-remote-operations>

                <!--<dxi-column dataField="no" dataType="number" caption="No." alignment="left" width="10%"></dxi-column>-->
                <dxi-column caption="No" cellTemplate="cellTemplateNo" [allowSorting]="false" [width]="50"
                            alignment="center"></dxi-column>

                <div *dxTemplate="let data of 'cellTemplateNo'" style="text-align: center;">
                  <span>{{ data.component.pageIndex() * data.component.pageSize() + data.rowIndex + 1 }}</span>
                </div>

                <dxi-column dataField="menuName" dataType="string" caption="Menu Name" width="100%"></dxi-column>
                <!--<dxi-column dataField="description" dataType="string" caption="Description"></dxi-column>-->
                <dxi-column dataField="updatedAt" caption="Updated At" sortOrder="desc" cssClass="wrapped-column"
                            [width]="150" alignment="center"></dxi-column>
                <dxi-column dataField="" dataType="string" caption="Action" cellTemplate="cellTemplateViewGroups"
                            [width]="155" alignment="center"></dxi-column>
                <div *dxTemplate="let data of 'cellTemplateViewGroups';let i=index;">
                  <a *ngIf="menuPermissions.view" [routerLink]="['/microservice-menus', data.data.menuId ,'view']"
                     id="btnView{{i}}" class="btn btn-default icon btn-sm mr-5" data-toggle="tooltip"
                     data-placement="top" title="View"><i class="fas fa-eye"></i></a>
                  <a *ngIf="menuPermissions.edit" [routerLink]="['/microservice-menus',data.data.menuId ,'edit']"
                     id="btnEdit{{i}}" class="btn btn-default icon btn-sm mr-5" data-toggle="tooltip"
                     data-placement="top" title="Edit"><i class="fas fa-edit"></i></a>
                  <a *ngIf="menuPermissions.delete" (click)="confirmDelete(data.data.menuId)" id="btnDelete{{i}}"
                     class="btn btn-default icon btn-sm" data-toggle="modal" data-target="#myModal88"
                     data-placement="top" title="Delete"><i class="fas fa-trash"></i></a>
                </div>
              </dx-data-grid>
            </div>
          </div>
          <!--End List-->
        </div><!--End ibox-content-->
      </div><!--End ibox-->
    </div><!--End col-sm-12-->
  </div><!--End row-->
</div><!--End Wrapper-->

<app-alert #myModal (onOkDelete)="onOkDelete()" (onCancelDelete)="onCancelDelete()"
           (onCancelViewWarning)="onCancelViewWarning()" (onCloseModalError)="onCloseModalError()"
           (onCloseModalWarning)="onCloseModalWarning()" (onClickBack)="onClickBack()"></app-alert>
