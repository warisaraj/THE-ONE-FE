<div class="row" style="width: 50%" *ngIf="loading">
    <div class="spiner-example-detail">
        <div class="sk-spinner sk-spinner-double-bounce">
            <div class="sk-double-bounce1"></div>
            <div class="sk-double-bounce2"></div>
        </div>
    </div>
</div>

<div class="row wrapper white-bg page-heading bgnone" *ngIf="!loading">

    <div class="soc-breadcrumb">
        <div class="row">
            <div class="col-md-8 col-xs-12 align-self-center">
                <h4 class="soc-title">Order</h4>
                <div class="d-flex align-items-center" style="margin-top: -10px;">
                    <nav>
                        <ol class="breadcrumb">
                            <li class="breadcrumb-item">
                                <a (click)="goHomeMenu()"><i class="fas fa-folder-open mr-10"></i>Order Management</a>
                            </li>
                            <li class="breadcrumb-item active">
                                Production Done List
                            </li>
                        </ol>
                    </nav>
                </div>
            </div>
        </div>
    </div>

</div>

<div class="wrapper wrapper-content-custom  animated fadeInRight">
    <div class="row">
        <div class="col-lg-12">
            <div class="ibox">
                <div class="ibox-bg">
                    <div class="ibox-heading">
                        <h5 class="ibox-title-text"><i class="fas fa-filter"></i>Filter</h5>
                        <div class="ibox-graph-info collapse-link" #collapseLink (click)="clickCollapse()">
                            <i class="far fa-chevron-down"></i>
                        </div>
                    </div>
                    <div class="ibox-body">
                        <div class="row">
                            <div class="col-sm-12">
                                <div class="panel-body">
                                    <form method="get" class="form-horizontal">
                                        <div class="form-group">
                                            <label class="col-sm-2 control-label">Production Date</label>
                                            <div class="col-sm-3">
                                                <dx-date-box style="width: 100%;" [openOnFieldClick]="true"
                                                    [acceptCustomValue]="false" class="form-control cus-datebox"
                                                    name="productionDate" type="date" displayFormat="dd/MM/yyyy"
                                                    [(ngModel)]="filter.productionDate">
                                                </dx-date-box>
                                            </div>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="ibox-footer">
                        <div class="ibox-footer-right">
                            <button title="Search" (click)="clickSearch()" class="btn btn-success btn-md mr-10"
                                *ngIf="menuPermissions.view">
                                <span>Search</span>
                            </button>
                            <button title="Clear" (click)="clickClear()" class="btn btn-default btn-md"
                                *ngIf="menuPermissions.view">
                                <span>Clear</span>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col-sm-12">
            <div class="ibox mb-0">
                <div class="ibox-bg" style="box-shadow : none !important">
                    <div class="ibox-heading-total">
                        <h5 class="ibox-title-text">{{textTotal}}</h5>
                        <h5 class="ibox-title-text" style="text-align: right;">{{totalCaseAndSupply}}</h5>
                    </div>
                    <div class="ibox-body">
                        <!--[selectedRowKeys]="selectRowKeyId" (onInitialized)="onInitialized($event)" (onSelectionChanged)="selectRow($event)"-->
                        <div class="table-responsive table-wrapper">
                            <dx-data-grid #gridDataPendingOrders id="gridDataPendingOrders"
                                [(dataSource)]="dataPendingOrders" showBorders="false" [hoverStateEnabled]="true"
                                noDataText="No data" [rowAlternationEnabled]="true" [columnAutoWidth]="true"
                                [allowColumnResizing]="true" (onCellPrepared)="onCellPrepared($event)"
                                class="card-list-table" (onOptionChanged)="changePageIndex($event)" (onRowPrepared)="onRowPrepared($event)">
                                <dxo-load-panel [enabled]="true"></dxo-load-panel>
                                <dxo-paging [pageSize]="dxgridPageSize" [pageIndex]="pageIndex"></dxo-paging>
                                <dxo-pager [showPageSizeSelector]="true" [allowedPageSizes]="allowedPageSizes"
                                    [showInfo]="false" [visible]="true" [showNavigationButtons]="true">
                                </dxo-pager>
                                <dxo-scrolling showScrollbar="onHover"></dxo-scrolling>
                                <dxo-selection mode="single"></dxo-selection>
                                <dxo-remote-operations [sorting]="true" [paging]="true">
                                </dxo-remote-operations>

                                <!--<dxi-column dataField="no" dataType="number" caption="No." alignment="left" width="10%"></dxi-column>-->
                                <dxi-column caption="No" cellTemplate="cellTemplateNo" [allowSorting]="false"
                                    [width]="50" alignment="center"></dxi-column>
                                <div *dxTemplate="let data of 'cellTemplateNo'" style="text-align: center;"
                                    title="{{ data.component.pageIndex() * data.component.pageSize() + data.rowIndex + 1 }}">
                                    <span>{{ data.component.pageIndex() * data.component.pageSize() + data.rowIndex +
                                        1}}</span>
                                </div>
                                <dxi-column dataField="orderId" dataType="string" caption="Order ID" alignment="center"></dxi-column>
                                <dxi-column [width]="150" dataField="hn" dataType="string" caption="HN" alignment="center"></dxi-column>
                                <dxi-column dataField="patientName" dataType="string" caption="Patient Name"></dxi-column>
                                <dxi-column [width]="70" dataField="typeName" dataType="string" caption="Type"
                                    calculateSortValue="type">
                                </dxi-column>
                                <dxi-column [width]="100" dataField="supplyDay" dataType="string" caption="Supply Day"
                                    alignment="center">
                                </dxi-column>
                                <dxi-column [width]="150" dataField="productionBookingSlotDateTime" dataType="string"
                                    caption="Production Booking Slot (Date/Time)">
                                </dxi-column>
                                <dxi-column [width]="105" dataField="lotNumber" dataType="string" caption="Lot Number"
                                    alignment="center">
                                </dxi-column>
                                <dxi-column [width]="150" dataField="productionStartDateTime" dataType="string" caption="Production Start
                                (Date/Time)" calculateSortValue="productionStartDate">
                                </dxi-column>
                                <dxi-column [width]="150" dataField="productionEndDateTime" dataType="string" caption="Production End
                                (Date/Time)" calculateSortValue="productionEndDate" sortOrder="asc">
                                </dxi-column>
                                <!-- <dxi-column [width]="240" dataType="string" caption="Operation">
                                    <dxi-column [width]="80" caption="เคสแทรก" alignment="center"
                                        cellTemplate="cellTemplateOperation1">
                                    </dxi-column>
                                    <dxi-column [width]="80" caption="Urgent" alignment="center"
                                        cellTemplate="cellTemplateOperation2">
                                    </dxi-column>
                                    <dxi-column [width]="80" caption="On-Time" alignment="center"
                                        cellTemplate="cellTemplateOperation3">
                                    </dxi-column>
                                </dxi-column> -->
                                <dxi-column [width]="180" dataField="productionNote" dataType="string" caption="Note">
                                </dxi-column>
                                <dxi-column [visible]="false" dataField="updatedAt" caption="Updated At"
                                    cssClass="wrapped-column" [width]="155" alignment="center"></dxi-column>
                                <dxi-column dataType="string" caption="Production Time">
                                    <div *ngFor="let data of timeSlot; let i=index;">
                                        <dxi-column cssClass="column-no-padding" [width]="30" [caption]="timeSlot[i]"
                                            alignment="center" cellTemplate="cellTemplateTimeSlot">
                                        </dxi-column>
                                    </div>
                                </dxi-column>

                                <div *dxTemplate="let data of 'cellTemplateOperation1';let i=index;">
                                    <span *ngIf="data.data.operation1">
                                        <i style="color:#AE934F" class="fas fa-check"></i>
                                    </span>
                                </div>

                                <div *dxTemplate="let data of 'cellTemplateOperation2';let i=index;">
                                    <span *ngIf="data.data.operation2">
                                        <i style="color:#AE934F" class="fas fa-check"></i>
                                    </span>
                                </div>

                                <div *dxTemplate="let data of 'cellTemplateOperation3';let i=index;">
                                    <span *ngIf="data.data.operation3">
                                        <i style="color:#AE934F" class="fas fa-check"></i>
                                    </span>
                                </div>

                                <div *dxTemplate="let item of 'cellTemplateTimeSlot';let j=index;">
                                    <div *ngFor="let data of timeSlot; let i=index;">
                                        <div [style.margin-left.%]="item.data.realStartTimeMin"
                                            style="width:2px;min-height:34px !important; background-color:#58A8CA;"
                                            *ngIf="item.columnIndex === i+11 && (item.data.realStartTime == timeSlot[i]) && (item.data.productionStartDateTime === item.data.productionEndDateTime)">
                                        </div>
                                        <div [style.margin-left.%]="item.data.realStartTimeMin"
                                            style="width:100%; min-height:34px !important; background-color:#58A8CA;"
                                            *ngIf="item.columnIndex === i+11 && (item.data.realStartTime == timeSlot[i]) && (item.data.productionStartDateTime !== item.data.productionEndDateTime) &&  (item.data.realStartTime !== item.data.realEndTime)">
                                        </div>
                                        <div [style.width.%]="item.data.realEndTimeMin-item.data.realStartTimeMin < 15 ? 15 : item.data.realEndTimeMin-item.data.realStartTimeMin"
                                            [style.margin-left.%]="item.data.realStartTimeMin"
                                            style="min-height:34px !important; background-color:#58A8CA;"
                                            *ngIf="item.columnIndex === i+11 && item.data.realStartTime == timeSlot[i] && (item.data.realStartTime === item.data.realEndTime) && (item.data.productionStartDateTime !== item.data.productionEndDateTime)">
                                        </div>
                                        <div style="width:100%; min-height:34px !important; background-color:#58A8CA"
                                            *ngIf="item.columnIndex === i+11 && item.data.realEndTime > timeSlot[i] && item.data.realStartTime < timeSlot[i] && (item.data.realStartTime !== item.data.realEndTime) &&  (item.data.productionStartDateTime !== item.data.productionEndDateTime)">
                                        </div>
                                        <div [style.width.%]="item.data.realEndTimeMin"
                                            style="min-height:34px !important; background-color:#58A8CA; text-align: left;"
                                            *ngIf="item.columnIndex === i+11 && item.data.realEndTime == timeSlot[i] && item.data.realEndTimeMin > 0 && (item.data.realStartTime !== item.data.realEndTime) && (item.data.productionStartDateTime !== item.data.productionEndDateTime)">
                                        </div>
                                        <div [style.margin-left.%]="(item.data.endTimeMin - 5)"
                                            style="width:5px;min-height:34px !important; background-color:#B50505;"
                                            *ngIf="item.columnIndex === i+11 && item.data.endTime == timeSlot[i] && item.data.endTimeMin > 0">
                                        </div>
                                        <div style="width:3px;min-height:34px !important; background-color:#B50505;"
                                            *ngIf="item.columnIndex === i+11 && item.data.endTime == timeSlot[i] && item.data.endTimeMin === 0">
                                        </div>

                                    </div>
                                </div>

                            </dx-data-grid>
                        </div>
                    </div>
                    <!--End List-->
                </div>
                <!--End ibox-content-->
            </div>
            <!--End ibox-->
        </div>
        <!--End col-sm-12-->
    </div>
    <!--End row-->
</div>
<!--End Wrapper-->

<app-alert #myModal (onCloseModalError)="onCloseModalError()" (onOkProductionModal)="onOkProduction()"
    (onOkProductionDoneModal)="onOkProductionDone($event)"></app-alert>
